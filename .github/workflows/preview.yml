name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🏗 Setup Node.js
        if: ${{ github.event.action != 'closed' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm
          check-latest: true

      - name: 📦 Install dependencies
        if: ${{ github.event.action != 'closed' }}
        run: npm ci --no-audit --ignore-scripts

      - name: 🏗️ Build
        if: ${{ github.event.action != 'closed' }}
        env:
          BASE_URL: "/pr-preview/pr-${{ github.event.number }}"
        run: npm run build

      - name: 📦 Get GitHub Pages URL
        uses: TuftsRT/get-pages-url@03ca0ae86ff191bc1167b5f0d72773e69ca4e5a9 # v1.0.1
        id: get-url

      - name: Extract domain
        id: domain
        run: |
          url="${{ steps.get-url.outputs.url }}"
          domain=$(echo "$url" | awk -F/ '{print $3}')
          echo "domain=$domain" >> $GITHUB_OUTPUT

      - name: 📦 Upload preview build to GitHub
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: out
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          pages-base-url: ${{ steps.domain.outputs.domain }}
          wait-for-pages-deployment: false

  collect:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Final Results
    timeout-minutes: 2
    needs:
      - preview
    steps:
      - name: ✔️ Fail if any dependency failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
